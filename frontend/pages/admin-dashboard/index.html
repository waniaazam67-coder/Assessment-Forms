<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shehersaaz Management Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <script src="../../assets/js/admin.js" defer></script>
</head>
<body class="admin-auth-shell">
  <main class="admin-auth">
    <section class="admin-auth__card">
      <div class="admin-auth__toolbar">
        <div class="admin-brand admin-brand--login">
          <img src="../../assets/images/Shehersaaz Logo Update 2025.png" alt="Shehersaaz Logo">
        </div>
      </div>

      <div>
        <h2>Sign in to continue</h2>
        <p class="admin-muted">Use the configured management credentials to open the dashboard interface.</p>
      </div>

      <form class="admin-form" data-admin-login-form>
        <label>
          <span>Email</span>
          <input type="email" name="email" placeholder="beenish.kulsoom@shehersaaz.org.pk" autocomplete="username" required>
        </label>

        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
        </label>

        <button type="submit" class="admin-button">Login</button>
        <p class="admin-feedback" data-admin-feedback aria-live="polite"></p>
      </form>

      <div class="admin-credentials">
        <p><strong>Backend-configured access</strong></p>
        <p>Set <code>MANAGEMENT_USERS</code> and <code>MANAGEMENT_PASSWORD</code> in <code>backend/.env</code>.</p>
      </div>
    </section>
  </main>
</body>
</html>
