<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/admin.css">
  <script src="../../assets/js/admin.js" defer></script>
</head>
<body class="admin-shell">
  <main class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand admin-brand--sidebar">
        <img src="../../assets/images/Shehersaaz Logo Update 2025.png" alt="Shehersaaz Logo">
      </div>

      <div class="admin-sidebar__scroll">
        <section class="admin-nav-group" aria-labelledby="sidebar-menu-heading">
          <p class="admin-nav-group__label" id="sidebar-menu-heading">Menu</p>
          <nav class="admin-nav" aria-label="Dashboard sections">
            <a href="#overview" class="admin-nav__link is-active">
              <span class="admin-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7" rx="1.4"></rect>
                  <rect x="14" y="3" width="7" height="7" rx="1.4"></rect>
                  <rect x="3" y="14" width="7" height="7" rx="1.4"></rect>
                  <rect x="14" y="14" width="7" height="7" rx="1.4"></rect>
                </svg>
              </span>
              <span class="admin-nav__text">Dashboard</span>
            </a>
            <a href="#households" class="admin-nav__link">
              <span class="admin-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 10.5 12 3l9 7.5"></path>
                  <path d="M5 9.5V21h5v-6h4v6h5V9.5"></path>
                </svg>
              </span>
              <span class="admin-nav__text">Households</span>
            </a>
            <a href="#data-tables" class="admin-nav__link">
              <span class="admin-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                  <path d="M3 10h18"></path>
                  <path d="M9 4v16"></path>
                </svg>
              </span>
              <span class="admin-nav__text">Data Tables</span>
              <span class="admin-nav__badge">Live</span>
            </a>
          </nav>
        </section>

        <section class="admin-nav-group" aria-labelledby="sidebar-general-heading">
          <p class="admin-nav-group__label" id="sidebar-general-heading">General</p>
          <div class="admin-nav admin-nav--secondary">
            <a class="admin-nav__link" href="../index.html">
              <span class="admin-nav__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 10.5 12 4l8 6.5"></path>
                  <path d="M6 9.5V20h12V9.5"></path>
                  <path d="M9 20v-5h6v5"></path>
                </svg>
              </span>
              <span class="admin-nav__text">Forms Portal</span>
            </a>
          </div>
        </section>
      </div>

      <div class="admin-sidebar__footer">
        <div class="admin-user-card">
          <div class="admin-user-card__avatar">AU</div>
          <div>
            <p data-admin-user-name>Management User</p>
            <small data-admin-user-email>Programme Manager</small>
          </div>
        </div>

        <div class="admin-sidebar__actions">
          <button type="button" class="admin-button admin-button--soft admin-button--logout" data-admin-logout>Log out</button>
        </div>
      </div>
    </aside>

    <section class="admin-content">
      <section class="admin-page is-active" id="overview" data-admin-page="overview">
        <div class="admin-overview-grid">
          <section class="admin-metrics" data-admin-metrics></section>
          <section class="admin-pipeline">
            <h3>Assessment pipeline</h3>
            <div class="admin-pipeline__rows" data-admin-pipeline></div>
          </section>
        </div>
      </section>

      <section class="admin-page" id="households" data-admin-page="households" hidden>
        <article class="admin-card">
          <div class="admin-card__header">
            <div>
              <h3>Households</h3>
              <p class="admin-card__subtitle">Individual household records</p>
            </div>
          </div>

          <label class="admin-household-search">
            <span>Search by household ID, name, or area</span>
            <input type="search" class="admin-search" placeholder="Search by household ID, name, or area..." data-admin-household-search>
          </label>

          <div class="admin-household-list" data-admin-household-list>
            <div class="admin-placeholder">Loading household records from the backend...</div>
          </div>
        </article>
      </section>

      <section class="admin-page" id="data-tables" data-admin-page="data-tables" hidden>
        <article class="admin-card">
          <div class="admin-card__header">
            <div>
              <h3>Data tables</h3>
              <p class="admin-card__subtitle">Filter, explore and export data</p>
            </div>
          </div>

          <div class="admin-filters" data-admin-filters>
            <label class="admin-filter">
              <span>Location / zone</span>
              <input type="text" placeholder="City, UC/NC, address" data-admin-filter-location>
            </label>
            <label class="admin-filter">
              <span>Status</span>
              <select data-admin-filter-status>
                <option value="">All statuses</option>
                <option value="passed">Eligible</option>
                <option value="failed">Not eligible</option>
              </select>
            </label>
            <label class="admin-filter">
              <span>Enumerator</span>
              <input type="text" placeholder="Enumerator name" data-admin-filter-name>
            </label>
            <label class="admin-filter">
              <span>Form progress</span>
              <select data-admin-filter-stage>
                <option value="">All stages</option>
                <option value="seaf">SEAF completed</option>
                <option value="engineering">Engineering completed</option>
                <option value="inventory">Inventory completed</option>
              </select>
            </label>
            <label class="admin-filter">
              <span>From</span>
              <input type="date" data-admin-filter-start-date>
            </label>
            <label class="admin-filter">
              <span>To</span>
              <input type="date" data-admin-filter-end-date>
            </label>
          </div>

          <div class="admin-actions admin-actions--export-panel">
            <button type="button" class="admin-button admin-button--ghost" data-admin-refresh>Refresh</button>
            <button type="button" class="admin-button admin-button--ghost" data-admin-export-csv>Download households CSV</button>
            <button type="button" class="admin-button" data-admin-export-json>Download snapshot JSON</button>
            <button type="button" class="admin-button admin-button--ghost" data-admin-export-seaf>Download SEAF CSV</button>
            <button type="button" class="admin-button admin-button--ghost" data-admin-export-engineering>Download Engineering CSV</button>
            <button type="button" class="admin-button admin-button--ghost" data-admin-export-inventory>Download Inventory CSV</button>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>HH ID</th>
                  <th>Head of HH</th>
                  <th>Zone</th>
                  <th>Tank</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody data-admin-data-table-body></tbody>
            </table>
          </div>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
